{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResearchDB — Sign In</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin/>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin/>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="/static/css/style.css" rel="stylesheet"/>
</head>
<body class="auth-page">

<!-- Glowing background orbs -->
<div class="auth-orb auth-orb-1"></div>
<div class="auth-orb auth-orb-2"></div>

<div class="auth-container">
  <div class="auth-card">
    <!-- Brand -->
    <div class="auth-brand">
      <div class="auth-brand-icon"><i class="fas fa-database"></i></div>
      <h1 class="auth-brand-name">ResearchDB</h1>
      <p class="auth-brand-sub">Research Data Management Platform</p>
    </div>

    <!-- Messages -->
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'danger' }} alert-dismissible fade show mb-3">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-subtitle">Sign in to your account to continue</p>

    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus autocomplete="username">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Enter password" id="passwordInput" autocomplete="current-password">
          <button type="button" class="btn btn-outline-secondary" id="togglePass" tabindex="-1">
            <i class="fas fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 fw-semibold" style="height:44px;font-size:.95rem">
        <i class="fas fa-right-to-bracket me-2"></i>Sign In
      </button>
    </form>

    <div class="auth-footer mt-3">
      Don't have an account?
      <a href="{% url 'register' %}">Create one</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('togglePass').addEventListener('click', () => {
  const inp = document.getElementById('passwordInput');
  const ico = document.getElementById('eyeIcon');
  const isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';
  ico.className = isHidden ? 'fas fa-eye-slash' : 'fas fa-eye';
});
</script>
</body>
</html>
